# Form 1040 line 13a spouse workflow.
# Approach: keep source statements authoritative and use this form only for supplemental non-statement spouse facts.
# NOTE: Raw spouse K-1 and 1099-DIV box 5 data belong in statement workflows, not here.
name: qualified-business-income-spouse
title: Form 1040 - Qualified business income deduction (spouse, line 13a)
multiplicity: single
formName: 1040
category: deductions
instructions:
  - Use this form only if your spouse has non-self-employment inputs relevant to Form 1040 line 13a.
  - The source inputs for line 13a come from uploaded statements such as spouse Schedule K-1 section 199A statements and spouse Form 1099-DIV box 5.
  - Use this form for spouse prior-year QBI loss carryforward, statement-upload confirmation, and spouse supplemental facts not captured directly from statements.
  - Self-employment QBI from Schedule C or Schedule F is out of scope for this product and must be blocked.
sections:
  - name: screening
    title: Screening
    multiplicity: single
    fields:
      - name: spouseHadQualifiedBusinessIncomeInputs
        type: boolean
        required: true
        label: Did your spouse have any qualified business income deduction inputs for line 13a?
        help: Select Yes if your spouse has relevant section 199A inputs from statements or prior-year carryforward support.

  - name: outOfScopeScreening
    title: Things we can't help with yet
    multiplicity: single
    showIf: spouseHadQualifiedBusinessIncomeInputs == true
    instructions:
      - Two paths are currently out of scope. Selecting Yes for either will result in a blocking flag after compute.
    fields:
      - name: spouseHasScheduleCOrScheduleFQbiSources
        type: boolean
        required: false
        label: Did any of your spouse's line 13a inputs come from Schedule C or Schedule F self-employment activity?
        help: Select Yes if any spouse section 199A input came from sole proprietorship or farm self-employment activity; this is currently out of scope.
      - name: spouseIsCooperativePatronOfAgriculturalHorticulturalCooperative
        type: boolean
        required: false
        label: Is your spouse a patron of a specified agricultural or horticultural cooperative?
        help: Select Yes if your spouse received a domestic production activities deduction from a specified cooperative (Form 8995-A Schedule D). This path is currently out of scope.

  - name: statementUploadCheck
    title: Spouse uploaded statements
    multiplicity: single
    showIf: spouseHadQualifiedBusinessIncomeInputs == true
    instructions:
      - The deduction is calculated from amounts in the spouse's uploaded statements. Confirm all applicable statements are in the library.
      - Relevant statements: K-1 (Form 1065) with section 199A, K-1 (Form 1120-S) with section 199A, K-1 (Form 1041) with section 199A, Form 1099-DIV box 5.
    fields:
      - name: spouseConfirmAllReceivedQbiStatementsUploaded
        type: boolean
        required: true
        label: I confirm all received spouse statements for line 13a are uploaded
        help: You must confirm this before saving.

  - name: priorYearCarryforward
    title: Spouse prior-year loss carryforwards
    multiplicity: single
    showIf: spouseHadQualifiedBusinessIncomeInputs == true
    instructions:
      - If the spouse's prior-year QBI worksheet shows a net loss that was not fully absorbed, it carries forward to reduce this year's deduction.
    fields:
      - name: spouseHasPriorYearQbiLossCarryforward
        type: boolean
        required: false
        label: Does your spouse have a prior-year QBI loss carryforward?
        help: Select Yes if your spouse's prior return or QBI worksheet shows a carryforward that reduces the current-year line 13a deduction.
      - name: spousePriorYearQbiLossCarryforwardAmount
        type: amount
        required: false
        placeholder: 0.00
        label: Spouse prior-year QBI loss carryforward amount
        help: Enter the spouse carryforward amount from prior-year QBI support. Shown only when spouseHasPriorYearQbiLossCarryforward is true.
      - name: spousePriorYearQbiCarryforwardNotes
        type: text
        required: false
        placeholder: Prior-year return or worksheet reference
        label: Spouse prior-year QBI carryforward notes
        help: Note where this carryforward came from. Shown only when spouseHasPriorYearQbiLossCarryforward is true.
      - name: spouseHasPriorYearReitPtpLossCarryforward
        type: boolean
        required: false
        label: Does your spouse have a prior-year REIT/PTP net loss carryforward?
        help: Select Yes if your spouse's prior-year qualified REIT dividends and PTP income netted to a loss that carries forward to offset current-year REIT/PTP income.
      - name: spousePriorYearReitPtpLossCarryforwardAmount
        type: amount
        required: false
        placeholder: 0.00
        label: Spouse prior-year REIT/PTP net loss carryforward amount
        help: Enter the carryforward amount. Reduces current-year qualified REIT/PTP income before the 20% component is computed. Shown only when spouseHasPriorYearReitPtpLossCarryforward is true.

  - name: supplementalAdjustments
    title: Spouse supplemental line 13a adjustments
    multiplicity: single
    showIf: spouseHadQualifiedBusinessIncomeInputs == true
    instructions:
      - Enter only spouse supplemental non-statement amounts or corrections needed for line 13a that are not already in uploaded statements.
    fields:
      - name: spouseManualQualifiedBusinessIncomeAdjustment
        type: amount
        required: false
        placeholder: 0.00
        label: Spouse manual qualified business income adjustment
        help: Enter any spouse non-self-employment QBI adjustment not already captured from statements.
      - name: spouseManualQualifiedReitDividendAdjustment
        type: amount
        required: false
        placeholder: 0.00
        label: Spouse manual qualified REIT dividend adjustment
        help: Enter any spouse adjustment to qualified REIT dividends not already captured from statements.
      - name: spouseManualQualifiedPtpIncomeOrLossAdjustment
        type: amount
        required: false
        placeholder: 0.00
        label: Spouse manual qualified PTP income or loss adjustment
        help: Enter any spouse qualified publicly traded partnership adjustment not already captured from statements.
      - name: spouseQbiSupplementalAdjustmentNotes
        type: text
        required: false
        placeholder: Explain the adjustment
        label: Spouse supplemental adjustment notes
        help: Briefly explain any spouse manual line 13a adjustment entered above.
