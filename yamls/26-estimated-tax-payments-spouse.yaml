name: estimated-tax-payments-spouse
title: Estimated Tax Payments (Spouse)
multiplicity: single
category: applications
person: spouse

# On MFJ returns the backend reads BOTH the taxpayer form and this spouse form and
# combines them on Form 1040 line 26. Each spouse can record their own payments on
# their respective form.
# On MFS returns each spouse records only their own payments on their own form.
# On all other statuses only the taxpayer form is used.

sections:
  - name: screening
    title: Spouse Estimated Tax Payments
    fields:
      - name: madeEstimatedTaxPayments
        type: boolean
        label: Did your spouse make any 2025 estimated tax payments, or apply a 2024 refund toward 2025 taxes?
        help: Estimated tax payments are amounts sent directly to the IRS to cover taxes not withheld from paychecks. This also includes any portion of a 2024 refund your spouse chose to apply toward 2025 taxes. On a joint return these are combined with the taxpayer's payments.
        required: false

  - name: installments
    title: 2025 Quarterly Payments
    showIf: madeEstimatedTaxPayments == true
    fields:
      - name: installment1Amount
        type: decimal
        label: Payment for January – March 2025
        help: Due April 15, 2025. Enter the amount your spouse actually paid for this period. Leave blank if no payment was made.
        placeholder: "0.00"
        required: false
      - name: installment2Amount
        type: decimal
        label: Payment for April – May 2025
        help: Due June 16, 2025 (June 15 was a Sunday). Leave blank if no payment was made for this period.
        placeholder: "0.00"
        required: false
      - name: installment3Amount
        type: decimal
        label: Payment for June – August 2025
        help: Due September 15, 2025. Leave blank if no payment was made for this period.
        placeholder: "0.00"
        required: false
      - name: installment4Amount
        type: decimal
        label: Payment for September – December 2025
        help: Due January 15, 2026. Not required if the return is filed and the full balance paid by February 2, 2026.
        placeholder: "0.00"
        required: false

  - name: priorYearCredits
    title: 2024 Refund Applied to 2025
    showIf: madeEstimatedTaxPayments == true
    fields:
      - name: priorYearOverpaymentCredited
        type: decimal
        label: 2024 refund applied to 2025 taxes
        help: If your spouse's 2024 return showed a refund and they elected to apply it toward 2025 taxes rather than receive a check, enter that amount here.
        placeholder: "0.00"
        required: false
      - name: amendedReturnOverpaymentCredited
        type: decimal
        label: Additional refund from a corrected 2024 return applied to 2025
        help: If a corrected 2024 return was filed and the extra refund was applied toward 2025 taxes instead of being paid out, enter it here.
        placeholder: "0.00"
        required: false
