# Form 1040 line 3a/3b (taxpayer/family head) workflow.
# Approach: keep user questions + imported statement fields + computed outputs in one YAML.
# NOTE: Sections marked as backend-only are NOT supposed to be rendered in the actual form component.
name: dividend-income-taxpayer
title: Form 1040 - Dividend income (taxpayer, lines 3a and 3b)
multiplicity: single
formName: 1040
category: income
instructions:
  - Start here only if the taxpayer had dividend income for Form 1040 lines 3a and/or 3b.
  - Upload validation is mandatory before entering supplemental details.
  - At least one 1099-DIV statement must be uploaded before continuing.
  - This taxpayer form owns return-level statement upload gating to avoid spouse conflicts.
  - Qualified dividends must always be less than or equal to ordinary dividends.
sections:
  - name: screening
    title: Screening
    multiplicity: single
    fields:
      - name: hadDividendIncome
        type: boolean
        required: true
        label: Did you have any dividend income during the tax year?
        help: If No, stop here and do not continue this interview.

  - name: statementUploadCheck
    title: Statement upload check
    multiplicity: single
    showIf: hadDividendIncome == true
    instructions:
      - At least one 1099-DIV statement must be uploaded to continue.
      - Component must block continue when required uploads are missing.
    fields:
      - name: hasUploadedAtLeastOne1099DivStatement
        type: boolean
        required: true
        label: Have you uploaded at least one Form 1099-DIV statement?
        help: Select Yes only after at least one 1099-DIV is uploaded.
      - name: received1099Div
        type: boolean
        required: false
        label: Did you receive Form 1099-DIV?
        help: Select Yes if any payer issued you a Form 1099-DIV.
      - name: uploaded1099Div
        type: boolean
        required: false
        label: If you received 1099-DIV, did you upload it?
        help: Select Yes only if all received 1099-DIV statements were uploaded.
      - name: confirmAllReceived1099DivUploaded
        type: boolean
        required: true
        label: I confirm all received 1099-DIV statements are uploaded
        help: You must confirm this before saving the dividend-income form.

  - name: supplementalDividendAmounts
    title: Supplemental dividend amounts
    multiplicity: single
    showIf: hadDividendIncome == true
    fields:
      - name: manualOrdinaryDividendsNotOnStatements
        type: amount
        required: false
        label: Ordinary dividends not reported on statements (line 3b)
        placeholder: 0.00
        help: Enter ordinary dividends not shown on uploaded 1099-DIV statements.
      - name: manualQualifiedDividendsNotOnStatements
        type: amount
        required: false
        label: Qualified dividends not reported on statements (line 3a)
        placeholder: 0.00
        help: Enter qualified dividends not shown on uploaded 1099-DIV statements.

  - name: nomineeDividends
    title: Nominee dividends
    multiplicity: single
    showIf: hadDividendIncome == true
    instructions:
      - Enter nominee amounts you received in your name but that belong to someone else.
      - Nominee amounts reduce what you report on Form 1040 lines 3a and 3b.
    fields:
      - name: hasNomineeDividends
        type: boolean
        required: false
        label: Did you receive dividends as a nominee for someone else?
        help: Select Yes if any reported dividends belong to another owner.
      - name: nomineeOrdinaryDividends
        type: amount
        required: false
        label: Nominee ordinary dividends to subtract from line 3b
        placeholder: 0.00
        help: Enter ordinary dividends received as nominee that do not belong to you.
      - name: nomineeQualifiedDividends
        type: amount
        required: false
        label: Nominee qualified dividends to subtract from line 3a
        placeholder: 0.00
        help: Enter qualified dividends received as nominee that do not belong to you.

  - name: qualifiedDividendDisallowedCategories
    title: Qualified dividend disallowed categories
    multiplicity: single
    showIf: hadDividendIncome == true
    instructions:
      - Enter only amounts that must be excluded from qualified dividends under IRS rules.
      - These amounts reduce line 3a but do not reduce line 3b unless separately entered as nominee ordinary dividends.
    fields:
      - name: nonQualifiedFromHoldingPeriodCommon61of121
        type: amount
        required: false
        label: Nonqualified dividends from failed common-stock 61-of-121 holding period test
        placeholder: 0.00
        help: Enter dividends that fail the 61-day holding period rule for common stock or most mutual funds.
      - name: nonQualifiedFromHoldingPeriodPreferred91of181
        type: amount
        required: false
        label: Nonqualified dividends from failed preferred-stock 91-of-181 holding period test
        placeholder: 0.00
        help: Enter dividends that fail the 91-day holding period rule for certain preferred stock.
      - name: nonQualifiedFromRelatedPaymentObligationShortSale
        type: amount
        required: false
        label: Nonqualified dividends due to related-payment obligation or short sale
        placeholder: 0.00
        help: Enter dividends disallowed because you were obligated to make related payments.
      - name: nonQualifiedPaymentsInLieu
        type: amount
        required: false
        label: Nonqualified payments in lieu of dividends
        placeholder: 0.00
        help: Enter payments in lieu you know are not qualified dividends.
      - name: nonQualifiedSurrogateForeignCorporationDividends
        type: amount
        required: false
        label: Nonqualified dividends from disallowed surrogate foreign corporations
        placeholder: 0.00
        help: Enter dividends excluded under the surrogate foreign corporation rule.
      - name: nonQualifiedNonTreatyForeignCorporationDividends
        type: amount
        required: false
        label: Nonqualified dividends from non-treaty foreign corporations
        placeholder: 0.00
        help: "Most filers leave this blank. Per IRS Publication 550 and Internal Revenue Code §1(h)(11)(C), a dividend from a foreign corporation is qualified only when the corporation (a) is incorporated in a U.S. possession, OR (b) is eligible for benefits of a U.S. tax treaty with an exchange-of-information program identified by the Treasury Secretary, OR (c) its stock is readily tradable on an established U.S. securities market. Enter dividends in box 1b that fail ALL THREE tests. Distinct from the surrogate foreign-corporation field above, which covers only Internal Revenue Code §7874 corporate inversions."

  - name: nomineeComplianceChecklist
    title: Nominee compliance checklist
    multiplicity: single
    showIf: hasNomineeDividends == true
    fields:
      - name: willIssueNominee1099DivToActualOwner
        type: boolean
        required: false
        label: I will issue Form 1099-DIV to the actual owner when required
        help: IRS generally requires nominee filers to issue Form 1099-DIV to the actual owner (spouse exception may apply).
      - name: willFileNominee1096And1099DivWithIrs
        type: boolean
        required: false
        label: I will file Forms 1096 and 1099-DIV with the IRS when required
        help: IRS generally requires nominee filers to submit Forms 1096 and 1099-DIV.

  # Backend-only statement imports. Not rendered in form component.
  - name: importedStatementFields
    title: Imported statement fields (backend only)
    multiplicity: single
    showIf: hadDividendIncome == true
    fields:
      - name: imported1099DivBox1aOrdinaryDividends
        type: amount
        required: false
        readOnly: true
        label: 1099-DIV box 1a total (imported)
      - name: imported1099DivBox1bQualifiedDividends
        type: amount
        required: false
        readOnly: true
        label: 1099-DIV box 1b total (imported)
      - name: imported1099DivPayerCount
        type: integer
        required: false
        readOnly: true
        label: Number of imported 1099-DIV payers

  # Backend-only computed values. Not rendered in form component.
  - name: computedOutputs
    title: Computed outputs (backend only)
    multiplicity: single
    showIf: hadDividendIncome == true
    fields:
      - name: computedLine3bOrdinaryDividends
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed Form 1040 line 3b
      - name: computedLine3aQualifiedDividends
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed Form 1040 line 3a
      - name: computedQualifiedDividendDisallowedTotal
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed disallowed qualified dividends total
      - name: computedScheduleBRequiredFromDividends
        type: boolean
        required: false
        readOnly: true
        computed: true
        label: Computed Schedule B required flag (dividends)
      - name: computedScheduleBPartIILine6OrdinaryDividends
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed Schedule B Part II line 6 (ordinary dividends)
