  - name: biomassItems
    title: Part II - Biomass stove or boiler items
    multiplicity: multiple
    showIf: claimsEnergyCreditOnReturn == true && claimsEnergyEfficientHomeImprovementCredit == true
    fields:
      - name: description
        type: text
        required: true
        placeholder: Biomass stove or boiler description
        label: Biomass stove or boiler description
      - name: qmid
        type: text
        required: false
        placeholder: QMID
        label: Biomass stove or boiler QMID
      - name: cost
        type: amount
        required: true
        placeholder: 0.00
        label: Biomass stove or boiler cost

  - name: importedFields
    title: Imported fields (backend only)
    multiplicity: single
    showIf: claimsEnergyCreditOnReturn == true
    fields:
      - name: importedForm1040Line18
        type: amount
        required: false
        readOnly: true
        label: Imported Form 1040 line 18 tax
      - name: importedSchedule3OtherCreditTotalBefore5695
        type: amount
        required: false
        readOnly: true
        label: Imported Schedule 3 nonrefundable credits before Form 5695

  - name: computedOutputs
    title: Computed outputs (backend only)
    multiplicity: single
    showIf: claimsEnergyCreditOnReturn == true
    fields:
      - name: computedForm5695Count
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed number of Form 5695 artifacts
      - name: computedLine15Schedule3Line5a
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed Form 5695 line 15 to Schedule 3 line 5a
      - name: computedLine32Schedule3Line5b
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed Form 5695 line 32 to Schedule 3 line 5b
