  - name: heatPumpWaterHeaterItems
    title: Part II - Heat pump water heater items
    multiplicity: multiple
    showIf: claimsEnergyCreditOnReturn == true && claimsEnergyEfficientHomeImprovementCredit == true
    fields:
      - name: description
        type: text
        required: true
        placeholder: Heat pump water heater description
        label: Heat pump water heater description
      - name: qmid
        type: text
        required: false
        placeholder: QMID
        label: Heat pump water heater QMID
      - name: cost
        type: amount
        required: true
