# Form 1040 line 8 (Schedule 1 line 10) workflow for taxpayer/family head.
# Approach: keep user questions + imported statement fields + computed outputs in one YAML.
# NOTE: Sections marked as backend-only are NOT supposed to be rendered in the actual form component.
name: other-incomes-taxpayer
title: Form 1040 - Other incomes (taxpayer, line 8 via Schedule 1)
multiplicity: single
formName: 1040
category: income
instructions:
  - Start here only if you had additional income that belongs on Schedule 1 Part I and Form 1040 line 8.
  - Line 8 is computed as Schedule 1 line 10, and Schedule 1 line 10 is lines 1-7 plus line 9.
  - Self-employment/business and farm income are out of scope and must be blocked.
  - Return-level statement upload confirmations are handled on this taxpayer form.
sections:
  - name: screening
    title: Screening
    multiplicity: single
    fields:
      - name: hadAdditionalIncomeForSchedule1
        type: boolean
        required: true
        label: Did you have additional income that belongs on Schedule 1 and Form 1040 line 8?
        help: If No, stop here and do not continue this workflow.

  - name: statementUploadCheck
    title: Statement upload check
    multiplicity: single
    showIf: hadAdditionalIncomeForSchedule1 == true
    instructions:
      - Confirm that all received statements related to Schedule 1 Part I were uploaded.
      - Some line 8 categories are manual-only and may not have statements.
    fields:
      - name: hasUploadedAtLeastOneOtherIncomeStatement
        type: boolean
        required: false
        label: Have you uploaded at least one Schedule 1 related statement?
        help: Select Yes if at least one relevant statement was uploaded.
      - name: received1099G
        type: boolean
        required: false
        label: Did you receive Form 1099-G?
        help: 1099-G can feed line 1 taxable refunds and line 7 unemployment compensation.
      - name: uploaded1099G
        type: boolean
        required: false
        label: If you received Form 1099-G, did you upload it?
        help: Select Yes only if all received 1099-G statements were uploaded.
      - name: received1099C
        type: boolean
        required: false
        label: Did you receive Form 1099-C?
        help: 1099-C can feed cancellation-of-debt income on line 8c.
      - name: uploaded1099C
        type: boolean
        required: false
        label: If you received Form 1099-C, did you upload it?
        help: Select Yes only if all received 1099-C statements were uploaded.
      - name: receivedForm2555
        type: boolean
        required: false
        label: Did you use Form 2555?
        help: Form 2555 can feed line 8d foreign earned income exclusion.
      - name: uploadedForm2555
        type: boolean
        required: false
        label: If you used Form 2555, did you upload it?
        help: Select Yes only if all applicable Form 2555 statements were uploaded.
      - name: receivedForm8853
        type: boolean
        required: false
        label: Did you use Form 8853?
        help: Form 8853 can feed line 8e.
      - name: uploadedForm8853
        type: boolean
        required: false
        label: If you used Form 8853, did you upload it?
        help: Select Yes only if all applicable Form 8853 statements were uploaded.
      - name: receivedForm8889
        type: boolean
        required: false
        label: Did you use Form 8889?
        help: Form 8889 can feed line 8f.
      - name: uploadedForm8889
        type: boolean
        required: false
        label: If you used Form 8889, did you upload it?
        help: Select Yes only if all applicable Form 8889 statements were uploaded.
      - name: confirmAllReceivedOtherIncomeStatementsUploaded
        type: boolean
        required: true
        label: I confirm all received statements for these Schedule 1 items are uploaded
        help: You must confirm this before saving.

  - name: outOfScopeScreening
    title: Out-of-scope screening
    multiplicity: single
    showIf: hadAdditionalIncomeForSchedule1 == true
    instructions:
      - Schedule C and Schedule F paths are out of scope for this product.
    fields:
      - name: hasScheduleCBusinessIncomeOutOfScope
        type: boolean
        required: false
        label: Do you have Schedule C business income or loss for Schedule 1 line 3?
        help: Select Yes if Schedule C is required. This return will be blocked in this product.
      - name: hasScheduleFFarmIncomeOutOfScope
        type: boolean
        required: false
        label: Do you have Schedule F farm income or loss for Schedule 1 line 6?
        help: Select Yes if Schedule F is required. This return will be blocked in this product.
      - name: hasSection962CfcElection
        type: boolean
        required: false
        label: Have you made a Section 962 election to be taxed at corporate rates on CFC income (Section 951 / 951A inclusions)?
        help: Select Yes if you made a Section 962 election for controlled foreign corporation income. This product does not support Section 962 elections; please consult a tax professional.

  - name: schedule1Lines1to7
    title: Schedule 1 lines 1 through 7
    multiplicity: single
    showIf: hadAdditionalIncomeForSchedule1 == true
    fields:
      - name: form1099KPersonalItemsDisclosureAmount
        type: amount
        required: false
        label: Form 1099-K amount reported for personal items sold at a loss or reported in error (disclosure only — does not affect income)
        placeholder: 0.00
        help: Enter the amount from Form 1099-K if it represents personal items you sold at a loss or amounts reported in error. This is a Schedule 1 matching/disclosure entry only and does not add to your taxable income.
      - name: taxableStateLocalRefundsLine1
        type: amount
        required: false
        label: Taxable state and local refunds (line 1)
        placeholder: 0.00
        help: Enter taxable refunds and similar items for Schedule 1 line 1.
      - name: alimonyReceivedLine2a
        type: amount
        required: false
        label: Alimony received (line 2a)
        placeholder: 0.00
        help: Enter taxable alimony received when applicable.
      - name: alimonyAgreementDateLine2b
        type: date
        required: false
        label: Date of original divorce or separation agreement (line 2b)
        help: Enter the original agreement date when line 2a alimony is reported.
      - name: otherGainsLossesLine4
        type: amount
        required: false
        label: Other gains or losses (line 4)
        placeholder: 0.00
        help: Enter gains or losses that map to Schedule 1 line 4.
      - name: rentalRealEstateRoyaltiesLine5
        type: amount
        required: false
        label: Rental real estate, royalties, partnerships, S corps, trusts (line 5)
        placeholder: 0.00
        help: Enter Schedule E amounts flowing to Schedule 1 line 5.
      - name: unemploymentCompensationLine7
        type: amount
        required: false
        label: Unemployment compensation (line 7)
        placeholder: 0.00
        help: Enter gross unemployment compensation before repayment adjustments.
      - name: repaidUnemploymentOverpaymentIn2025
        type: boolean
        required: false
        label: Did you repay unemployment compensation in 2025?
        help: Select Yes if a 2025 unemployment overpayment was repaid.
      - name: unemploymentRepaymentAdjustment
        type: amount
        required: false
        label: Unemployment repayment adjustment amount
        placeholder: 0.00
        help: Enter repayment amount used to reduce Schedule 1 line 7.

  - name: schedule1OtherIncome8
    title: Schedule 1 other income (line 8a through line 8v)
    multiplicity: single
    showIf: hadAdditionalIncomeForSchedule1 == true
    fields:
      - name: otherIncomeNetOperatingLoss8a
        type: amount
        required: false
        label: Net operating loss (line 8a)
        placeholder: 0.00
        help: Enter as positive input; engine applies required negative sign.
      - name: otherIncomeGambling8b
        type: amount
        required: false
        label: Gambling income (line 8b)
        placeholder: 0.00
        help: Enter gambling income included on Schedule 1 line 8b.
      - name: otherIncomeCancellationOfDebt8c
        type: amount
        required: false
        label: Cancellation of debt (line 8c)
        placeholder: 0.00
        help: Enter cancellation-of-debt income included on line 8c.
      - name: otherIncomeForeignEarnedIncomeExclusion8d
        type: amount
        required: false
        label: Foreign earned income exclusion from Form 2555 (line 8d)
        placeholder: 0.00
        help: Enter as positive input; engine applies required negative sign.
      - name: otherIncomeForm88538e
        type: amount
        required: false
        label: Income from Form 8853 (line 8e)
        placeholder: 0.00
        help: Enter Form 8853 income flowing to line 8e.
      - name: otherIncomeForm88898f
        type: amount
        required: false
        label: Income from Form 8889 (line 8f)
        placeholder: 0.00
        help: Enter Form 8889 income flowing to line 8f.
      - name: otherIncomeAlaskaPermanentFundDividends8g
        type: amount
        required: false
        label: Alaska Permanent Fund dividends (line 8g)
        placeholder: 0.00
        help: Enter taxable Alaska Permanent Fund dividends.
      - name: otherIncomeJuryDutyPay8h
        type: amount
        required: false
        label: Jury duty pay (line 8h)
        placeholder: 0.00
        help: Enter jury duty pay included on line 8h.
      - name: otherIncomePrizesAwards8i
        type: amount
        required: false
        label: Prizes and awards (line 8i)
        placeholder: 0.00
        help: Enter taxable prizes and awards.
      - name: otherIncomeHobbyIncome8j
        type: amount
        required: false
        label: Activity not engaged in for profit income (line 8j)
        placeholder: 0.00
        help: Enter hobby income reported on line 8j.
      - name: otherIncomeStockOptions8k
        type: amount
        required: false
        label: Stock options (line 8k)
        placeholder: 0.00
        help: Enter stock-option income not reported elsewhere.
      - name: otherIncomeRentalPersonalProperty8l
        type: amount
        required: false
        label: Rental of personal property income (line 8l)
        placeholder: 0.00
        help: Enter income from rental of personal property not reported on Schedule C/E.
      - name: otherIncomeOlympicParalympic8m
        type: amount
        required: false
        label: Olympic or Paralympic medals and prize money (line 8m)
        placeholder: 0.00
        help: Enter taxable amount for line 8m.
      - name: otherIncomeSection951a8n
        type: amount
        required: false
        label: Section 951(a) inclusion (line 8n)
        placeholder: 0.00
        help: Enter section 951(a) inclusion amount.
      - name: otherIncomeSection951A8o
        type: amount
        required: false
        label: Section 951A(a) inclusion (line 8o)
        placeholder: 0.00
        help: Enter section 951A(a) inclusion amount.
      - name: otherIncomeSection461l8p
        type: amount
        required: false
        label: Section 461(l) excess business loss adjustment (line 8p)
        placeholder: 0.00
        help: Enter section 461(l) adjustment only when applicable.
      - name: otherIncomeAbleDistributions8q
        type: amount
        required: false
        label: Taxable ABLE account distributions (line 8q)
        placeholder: 0.00
        help: Enter taxable ABLE account distributions.
      - name: otherIncomeScholarships8r
        type: amount
        required: false
        label: Scholarships and fellowship grants not on Form W-2 (line 8r)
        placeholder: 0.00
        help: Enter taxable scholarship and fellowship grant amounts.
      - name: otherIncomeNonqualifiedDeferredComp8t
        type: amount
        required: false
        label: Pension or annuity from nonqualified deferred comp or nongovernmental 457 plan (line 8t)
        placeholder: 0.00
        help: Enter line 8t income amount.
      - name: otherIncomeWagesWhileIncarcerated8u
        type: amount
        required: false
        label: Wages earned while incarcerated (line 8u)
        placeholder: 0.00
        help: Enter wages earned while incarcerated.
      - name: otherIncomeDigitalAssets8v
        type: amount
        required: false
        label: Digital assets received as ordinary income not reported elsewhere (line 8v)
        placeholder: 0.00
        help: Enter taxable ordinary digital-asset income not already reported.

  - name: otherIncomeItems8z
    title: Other income items (line 8z)
    multiplicity: multiple
    showIf: hadAdditionalIncomeForSchedule1 == true
    instructions:
      - Add one row for each additional line 8z item.
    fields:
      - name: description
        type: text
        required: true
        label: Description
        placeholder: Enter line 8z description
        help: Enter a short description for this other income item.
      - name: amount
        type: amount
        required: true
        label: Amount
        placeholder: 0.00
        help: Enter amount for this line 8z item.

  # Backend-only imported fields. Not rendered in the actual form component.
  - name: importedStatementFields
    title: Imported statement fields (backend only)
    multiplicity: single
    showIf: hadAdditionalIncomeForSchedule1 == true
    fields:
      - name: imported1099GLine1TaxableRefunds
        type: amount
        required: false
        readOnly: true
        label: Imported taxable refunds from 1099-G (line 1)
      - name: imported1099GLine7UnemploymentCompensation
        type: amount
        required: false
        readOnly: true
        label: Imported unemployment compensation from 1099-G (line 7)
      - name: imported1099CLine8cCancellationOfDebt
        type: amount
        required: false
        readOnly: true
        label: Imported cancellation-of-debt amount from 1099-C (line 8c)
      - name: importedForm2555Line8dForeignExclusion
        type: amount
        required: false
        readOnly: true
        label: Imported Form 2555 exclusion amount (line 8d)
      - name: importedForm8853Line8e
        type: amount
        required: false
        readOnly: true
        label: Imported Form 8853 amount (line 8e)
      - name: importedForm8889Line8f
        type: amount
        required: false
        readOnly: true
        label: Imported Form 8889 amount (line 8f)

  # Backend-only computed outputs. Not rendered in the actual form component.
  - name: computedOutputs
    title: Computed outputs (backend only)
    multiplicity: single
    showIf: hadAdditionalIncomeForSchedule1 == true
    fields:
      - name: computedSchedule1Line9TotalOtherIncome
        type: amount
        required: false
        readOnly: true
        label: Computed Schedule 1 line 9 total other income
      - name: computedSchedule1Line10TotalAdditionalIncome
        type: amount
        required: false
        readOnly: true
        label: Computed Schedule 1 line 10 total additional income
      - name: computedForm1040Line8
        type: amount
        required: false
        readOnly: true
        label: Computed Form 1040 line 8
