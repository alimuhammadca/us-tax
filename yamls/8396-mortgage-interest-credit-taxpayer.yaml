# Form 8396 - Mortgage Interest Credit - taxpayer.
# Current app scope supports one consolidated Form 8396 per return.
# The taxpayer form owns the return-level MCC screening, mortgage-interest inputs,
# and prior-year carryforwards. The spouse form is supplemental only on MFJ returns.
name: mortgage-interest-credit-taxpayer
title: Form 8396 - Mortgage interest credit (taxpayer)
multiplicity: single
formName: 8396
category: deductions
instructions:
  - Use this form for the return-level Form 8396 screening and mortgage credit certificate details.
  - In the current app scope, the return produces one consolidated Form 8396.
  - Mortgage interest already entered in Standard deductions is imported when available so you do not need to enter it twice.
  - If the mortgage credit certificate applies to less than the full mortgage, provide the certified and original mortgage amounts so line 1 can be prorated.
sections:
  - name: screening
    title: Screening
    multiplicity: single
    fields:
      - name: claimsMortgageInterestCredit
        type: boolean
        required: true
        label: Do you need to compute a mortgage interest credit for 2025?
      - name: hasQualifiedMortgageCreditCertificate
        type: boolean
        required: false
        label: Do you have a qualified Mortgage Credit Certificate (MCC)?
      - name: mainHomeWithinMccJurisdiction
        type: boolean
        required: false
        label: Is the certified home your qualified main home within the issuing jurisdiction?
      - name: interestPaidToRelatedPerson
        type: boolean
        required: false
        label: Was any mortgage interest paid to a related person?

  - name: mccCore
    title: MCC and mortgage-interest inputs
    multiplicity: single
    showIf: claimsMortgageInterestCredit == true
    instructions:
      - Enter the certificate rate and mortgage-interest facts used to compute Form 8396 lines 1 through 3.
      - Leave total mortgage interest blank if the imported Standard deductions amount already reflects the full current-year eligible mortgage interest.
    fields:
      - name: mccCertificateNumber
        type: text
        required: false
        label: Mortgage Credit Certificate number
      - name: mccHomeAddress
        type: text
        required: false
        label: Certified home address
      - name: certificateCreditRatePercent
        type: amount
        required: false
        label: MCC certificate credit rate percentage
        placeholder: 0.00
      - name: totalMortgageInterestPaid
        type: amount
        required: false
        label: Total current-year mortgage interest paid for the MCC home
        placeholder: 0.00
      - name: certifiedMortgageInterestPaidOverride
        type: amount
        required: false
        label: Certified mortgage interest override amount for Form 8396 line 1
        placeholder: 0.00
      - name: certifiedIndebtednessAmount
        type: amount
        required: false
        label: Certified indebtedness amount
        placeholder: 0.00
      - name: originalMortgageAmount
        type: amount
        required: false
        label: Original mortgage amount
        placeholder: 0.00
      - name: nonSpouseOwnerSharePercent
        type: amount
        required: false
        label: Non-spouse ownership share percentage, if the home was owned with someone outside the return
        placeholder: 100.00

  - name: carryforward
    title: Prior-year carryforwards
    multiplicity: single
    showIf: claimsMortgageInterestCredit == true
    fields:
      - name: carryforward2022From2024Form8396Line16
        type: amount
        required: false
        label: Carryforward from 2022 shown on 2024 Form 8396 line 16
        placeholder: 0.00
      - name: carryforward2023From2024Form8396Line14
        type: amount
        required: false
        label: Carryforward from 2023 shown on 2024 Form 8396 line 14
        placeholder: 0.00
      - name: carryforward2024From2024Form8396Line17
        type: amount
        required: false
        label: Carryforward from 2024 shown on 2024 Form 8396 line 17
        placeholder: 0.00

  - name: importedSupport
    title: Imported support values (backend only - not rendered)
    multiplicity: single
    showIf: claimsMortgageInterestCredit == true
    fields:
      - name: importedHomeMortgageInterestPaid
        type: amount
        required: false
        readOnly: true
        label: Imported home mortgage interest from Standard deductions
      - name: importedForm1040Line18
        type: amount
        required: false
        readOnly: true
        label: Imported Form 1040 line 18 total tax before credits
      - name: importedForm1040Line19
        type: amount
        required: false
        readOnly: true
        label: Imported Form 1040 line 19 child tax credit

  - name: computedOutputs
    title: Computed outputs (backend only - not rendered)
    multiplicity: single
    showIf: claimsMortgageInterestCredit == true
    fields:
      - name: form8396Line9
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed - Form 8396 line 9 mortgage interest credit
      - name: form8396Line17
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed - Form 8396 line 17 carryforward
      - name: scheduleAMortgageInterestReductionAmount
        type: amount
        required: false
        readOnly: true
        computed: true
        label: Computed - Schedule A mortgage-interest reduction amount from Form 8396 line 3
